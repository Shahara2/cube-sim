
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif);color:var(--color-text-primary);background:transparent}
.hub{padding:.75rem 0;direction:rtl}
.hub-tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:0.5px solid var(--color-border-tertiary)}

.coming{display:flex;align-items:center;justify-content:center;height:200px;color:var(--color-text-tertiary);font-size:14px;flex-direction:column;gap:8px}
</style>

<script>
const canvas=document.getElementById('sc');
const ctx=canvas.getContext('2d');
let dpr=1,cw=400,ch=185;

function rz(){
  dpr=window.devicePixelRatio||1;
  cw=Math.max(200,canvas.parentElement.clientWidth-20);
  canvas.width=cw*dpr;canvas.height=ch*dpr;
  ctx.scale(dpr,dpr);
}

// ---- Display formatter — keeps original form ----
function fmtDisplay(xc,nc){
  // show fractions nicely if xc is simple fraction
  let xPart='',nPart='';
  const xr=Math.round(xc*1e6)/1e6;
  const nr=Math.round(nc*1e6)/1e6;
  if(xr!==0){
    if(xr===1)xPart='x';
    else if(xr===-1)xPart='-x';
    else{
      // try to show as fraction
      const frac=toFrac(xr);
      xPart=(frac||xr)+'x';
    }
  }
  if(nr!==0){
    const nFrac=toFrac(nr);
    const nStr=nFrac||nr;
    if(nr>0&&xr!==0)nPart='+'+nStr;
    else nPart=''+nStr;
  }
  if(!xPart&&!nPart)return'0';
  return xPart+nPart;
}

function toFrac(v){
  // try denominators up to 12
  for(let d=2;d<=12;d++){
    const n=Math.round(v*d);
    if(Math.abs(n/d-v)<1e-8){
      if(Math.abs(n)%d!==0)return n+'/'+d;
    }
  }
  return null;
}

function fmtEq(s){return fmtDisplay(s.lx,s.ln)+' = '+fmtDisplay(s.rx,s.rn);}

// ---- Parser: stores original tokens, does NOT expand ----
// We store the equation exactly as typed for display.
// For computation, we DO expand internally.
function expandSide(t){
  // expand parentheses: A(Bx+C) -> ABx+AC
  t=t.replace(/([+-]?\d*\.?\d*)\(([^)]+)\)/g,(m,a,inner)=>{
    const A=a===''||a==='+'?1:a==='-'?-1:parseFloat(a)||1;
    const im=inner.match(/^([+-]?\d*\.?\d*)x([+-]\d+\.?\d*)?$/);
    if(!im)return m;
    const ix=im[1]===''||im[1]==='+'?1:im[1]==='-'?-1:parseFloat(im[1])||1;
    const ib=im[2]?parseFloat(im[2]):0;
    return (A*ix===1?'':A*ix===-1?'-':(A*ix))+'x'+(A*ib>=0&&ix?'+'+A*ib:A*ib);
  });
  // handle x/D -> (1/D)x
  t=t.replace(/([+-]?\d*\.?\d*)x\/(\d+\.?\d*)/g,(m,n,d)=>{
    const N=n===''||n==='+'?1:n==='-'?-1:parseFloat(n)||1;
    const D=parseFloat(d);
    const v=N/D;
    return(v===1?'':v===-1?'-':v)+'x';
  });
  let xc=0,nc=0;
  const xterms=t.match(/[+-]?\d*\.?\d*x/g)||[];
  let rem=t;
  xterms.forEach(m=>{
    rem=rem.replace(m,'');
    const c=m.replace('x','');
    if(c===''||c==='+')xc+=1;
    else if(c==='-')xc-=1;
    else xc+=parseFloat(c)||0;
  });
  if(rem!==''&&rem!=='+'){const v=parseFloat(rem);if(!isNaN(v))nc=v;}
  return{xc:Math.round(xc*1e6)/1e6,nc:Math.round(nc*1e6)/1e6};
}

function parseEqStr(raw){
  const s=raw.replace(/\s/g,'');
  const parts=s.split('=');
  if(parts.length!==2)return null;
  const L=expandSide(parts[0]),R=expandSide(parts[1]);
  return{lx:L.xc,ln:L.nc,rx:R.xc,rn:R.nc,origLeft:parts[0],origRight:parts[1]};
}

// ---- Data ----
const defaultRaws=['2x=8','x+3=10','3x-1=8','4x+2=14','2(x+1)=10','x/2+1=5'];
let eqs=defaultRaws.map(raw=>{
  const p=parseEqStr(raw);
  return{raw,...p,done:false,expanded:false};
});
let ci=0;
let st={lx:0,ln:0,rx:0,rn:0};
let displayRaw={left:'',right:''};
let op='add',xMode=null;
let log=[];
let busy=false;

function r3(v){return Math.round(v*1000)/1000;}

// ---- Scale ----
function getTilt(s){
  const dlx=s.lx-s.rx;
  if(dlx===0)return 0;
  const sol=(s.rn-s.ln)/dlx;
  const lv=s.lx*sol+s.ln,rv=s.rx*sol+s.rn;
  return Math.max(-16,Math.min(16,(lv-rv)*1.6));
}

function drawWeightShape(cx,by,label,fc,tc,pw,wh){
  ctx.fillStyle=fc;ctx.strokeStyle=tc+'66';ctx.lineWidth=0.7;
  ctx.beginPath();ctx.roundRect(cx-pw/2,by,pw,wh,4);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.roundRect(cx-5,by-5,10,7,3);ctx.fill();ctx.stroke();
  ctx.fillStyle=tc;
  const fs=Math.min(13,Math.max(9,pw/(Math.max(label.length,1))*1.5));
  ctx.font=`500 ${fs}px var(--font-sans,sans-serif)`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,cx,by+wh/2);
}

function drawScale(s,exL,exR){
  rz();
  ctx.clearRect(0,0,cw,ch);
  const dk=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const C={
    beam:dk?'rgba(255,255,255,.22)':'rgba(0,0,0,.22)',
    piv:dk?'rgba(255,255,255,.45)':'rgba(0,0,0,.45)',
    lPan:dk?'#1a3a5c':'#E6F1FB',lTxt:dk?'#85B7EB':'#0C447C',
    rPan:dk?'#3d2800':'#FAEEDA',rTxt:dk?'#FAC775':'#633806',
    sPan:dk?'#1a3520':'#EAF3DE',sTxt:dk?'#9FE1CB':'#27500A',
    addW:'#C0DD97',addWt:'#27500A',
    subW:'#F7C1C1',subWt:'#791F1F',
  };
  const pivX=cw/2,pivY=76;
  const arm=Math.min(cw*.38,165);
  const tilt=getTilt(s);
  const rad=tilt*Math.PI/180;
  const lEx=pivX-arm*Math.cos(rad),lEy=pivY+arm*Math.sin(rad);
  const rEx=pivX+arm*Math.cos(rad),rEy=pivY-arm*Math.sin(rad);
  const chain=20,panW=Math.min(94,arm*.78),panH=34;

  ctx.fillStyle=C.beam;
  ctx.beginPath();ctx.roundRect(pivX-2.5,pivY,5,56,2);ctx.fill();
  ctx.beginPath();ctx.moveTo(pivX-24,pivY+56);ctx.lineTo(pivX-44,pivY+65);ctx.lineTo(pivX+44,pivY+65);ctx.lineTo(pivX+24,pivY+56);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.roundRect(pivX-52,pivY+65,104,7,3);ctx.fill();
  ctx.save();ctx.translate(pivX,pivY);ctx.rotate(-rad);
  ctx.fillStyle=C.beam;ctx.beginPath();ctx.roundRect(-arm,-2.5,arm*2,5,2.5);ctx.fill();
  ctx.restore();
  ctx.fillStyle=C.piv;ctx.beginPath();ctx.arc(pivX,pivY,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=dk?'#111':'#fff';ctx.beginPath();ctx.arc(pivX,pivY,2.5,0,Math.PI*2);ctx.fill();

  function drawPan(ex,ey,xc,nc,side,extra){
    ctx.strokeStyle=C.beam;ctx.lineWidth=1;ctx.setLineDash([2,3]);
    ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(ex,ey+chain);ctx.stroke();
    ctx.setLineDash([]);
    ctx.strokeStyle=C.beam;ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(ex-panW/2,ey+chain);ctx.lineTo(ex+panW/2,ey+chain);ctx.stroke();
    const py=ey+chain;
    const solved=isSolved();
    const fc=solved?C.sPan:side==='l'?C.lPan:C.rPan;
    const tc=solved?C.sTxt:side==='l'?C.lTxt:C.rTxt;
    const lbl=fmtDisplay(xc,nc);
    drawWeightShape(ex,py,lbl,fc,tc,panW,panH);
    if(extra&&extra.alpha>0){
      const ewH=22,ewW=Math.min(58,panW*.58);
      const ewY=py-ewH-10;
      const fc2=extra.isAdd?C.addW:C.subW;
      const tc2=extra.isAdd?C.addWt:C.subWt;
      ctx.globalAlpha=extra.alpha;
      drawWeightShape(ex,ewY,extra.label,fc2,tc2,ewW,ewH);
      ctx.globalAlpha=1;
    }
    ctx.fillStyle=dk?'rgba(255,255,255,.25)':'rgba(0,0,0,.25)';
    ctx.font=`10px var(--font-sans,sans-serif)`;
    ctx.textAlign='center';ctx.textBaseline='alphabetic';
    ctx.fillText(side==='l'?'צד שמאל':'צד ימין',ex,ey+chain+panH+12);
  }
  drawPan(lEx,lEy,s.lx,s.ln,'l',exL);
  drawPan(rEx,rEy,s.rx,s.rn,'r',exR);
}

// ---- Animation ----
function animateApply(beforeSt,afterSt,effOp,xc,nc,lbl,onDone){
  busy=true;
  document.getElementById('exec-btn').disabled=true;
  const bar=document.getElementById('anim-bar');
  const midSt={
    lx:r3(effOp==='add'?beforeSt.lx+xc:effOp==='sub'?beforeSt.lx-xc:effOp==='mul'?beforeSt.lx*nc:beforeSt.lx/nc),
    ln:r3(effOp==='add'?beforeSt.ln+nc:effOp==='sub'?beforeSt.ln-nc:effOp==='mul'?beforeSt.ln*nc:beforeSt.ln/nc),
    rx:beforeSt.rx,rn:beforeSt.rn
  };
  const isAdd=(effOp==='add')||(effOp==='mul'&&nc>0)||(effOp==='div'&&nc>0);
  const exInfo={label:lbl,isAdd};
  const verb=effOp==='add'?'מוסיפים':effOp==='sub'?'מחסירים':effOp==='mul'?'מכפילים':'מחלקים';
  bar.textContent=`${verb} ${lbl} לצד שמאל — המאזניים הטו`;
  let a=0;
  const t1=setInterval(()=>{a=Math.min(1,a+0.1);drawScale(midSt,{...exInfo,alpha:a},null);if(a>=1)clearInterval(t1);},40);
  setTimeout(()=>{
    clearInterval(t1);
    bar.textContent=`${verb} ${lbl} גם לצד ימין — המאזניים מתאזנים`;
    let a2=0;
    const t2=setInterval(()=>{a2=Math.min(1,a2+0.1);drawScale(midSt,null,{...exInfo,alpha:a2});if(a2>=1)clearInterval(t2);},40);
    setTimeout(()=>{clearInterval(t2);bar.textContent='';drawScale(afterSt);onDone();},900);
  },900);
}

// ---- Controls ----
function selOp(o){
  op=o;xMode=null;
  document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('op-'+o).classList.add('sel');
  document.getElementById('xadd-btn').classList.remove('on');
  document.getElementById('xsub-btn').classList.remove('on');
  updPreview();
}
function selXOp(m){
  xMode=xMode===m?null:m;
  if(xMode){op='add';document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('sel'));}
  document.getElementById('xadd-btn').classList.toggle('on',xMode==='add');
  document.getElementById('xsub-btn').classList.toggle('on',xMode==='sub');
  updPreview();
}
function updPreview(){
  const num=parseFloat(document.getElementById('num-inp').value)||0;
  const coef=parseFloat(document.getElementById('x-coef').value)||1;
  const sym={add:'+',sub:'−',mul:'·',div:'÷'}[op];
  let txt;
  if(xMode==='add')txt=coef===1?'+x':'+'+coef+'x';
  else if(xMode==='sub')txt=coef===1?'−x':'−'+coef+'x';
  else txt=sym+num;
  document.getElementById('preview-box').textContent=txt;
}

// ---- Apply ----
function isSolved(){return st.lx===1&&Math.abs(st.ln)<1e-9&&Math.abs(st.rx)<1e-9;}

function doApply(){
  if(busy)return;
  const err=document.getElementById('err-msg');err.textContent='';
  const num=parseFloat(document.getElementById('num-inp').value);
  const coef=parseFloat(document.getElementById('x-coef').value)||1;
  if(isNaN(num)&&!xMode){err.textContent='הכנס מספר תקין';return;}
  let xc=0,nc=0,effOp=op;
  if(xMode==='add'){xc=coef;nc=0;effOp='add';}
  else if(xMode==='sub'){xc=coef;nc=0;effOp='sub';}
  else{nc=num;}
  if((effOp==='div'||effOp==='mul')&&nc===0){err.textContent='ערך לא תקין';return;}

  const sym={add:'+',sub:'−',mul:'·',div:'÷'}[effOp];
  let lbl;
  if(xMode==='add')lbl=coef===1?'+x':'+'+coef+'x';
  else if(xMode==='sub')lbl=coef===1?'−x':'−'+coef+'x';
  else lbl=sym+r3(nc);

  function applyS(s){
    return{
      lx:r3(effOp==='add'?s.lx+xc:effOp==='sub'?s.lx-xc:effOp==='mul'?s.lx*nc:s.lx/nc),
      ln:r3(effOp==='add'?s.ln+nc:effOp==='sub'?s.ln-nc:effOp==='mul'?s.ln*nc:s.ln/nc),
      rx:r3(effOp==='add'?s.rx+xc:effOp==='sub'?s.rx-xc:effOp==='mul'?s.rx*nc:s.rx/nc),
      rn:r3(effOp==='add'?s.rn+nc:effOp==='sub'?s.rn-nc:effOp==='mul'?s.rn*nc:s.rn/nc),
    };
  }
  const afterSt=applyS(st);
  animateApply({...st},afterSt,effOp,xc,nc,lbl,()=>{
    st=afterSt;
    log.push({op:lbl,eq:fmtEq(st)});
    xMode=null;
    document.getElementById('xadd-btn').classList.remove('on');
    document.getElementById('xsub-btn').classList.remove('on');
    busy=false;
    document.getElementById('exec-btn').disabled=false;
    if(isSolved())eqs[ci].done=true;
    render();
  });
}

// ---- Render ----
function renderProgress(){
  const total=eqs.length;
  const done=eqs.filter(e=>e.done).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-label').textContent=`פתרת ${done} תרגילים מתוך ${total}`;
  document.getElementById('prog-count').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  const dots=document.getElementById('prog-dots');
  dots.innerHTML=eqs.map((e,i)=>`<div class="prog-dot ${i===ci?'curr':e.done?'done':''}" title="${e.raw}" onclick="loadIdx(${i})"></div>`).join('');
}

function render(){
  drawScale(st);
  const disp=document.getElementById('eq-disp');
  if(isSolved()){
    const sol=r3(st.rn);
    disp.innerHTML=`<span style="color:#0C447C;background:#E6F1FB;border-radius:6px;padding:2px 14px">x = ${sol}</span>`;
  } else disp.textContent=fmtEq(st);

  // show original raw equation under current
  const orig=document.getElementById('eq-orig');
  const e=eqs[ci];
  if(e&&(e.raw.includes('(')||e.raw.includes('/'))){
    orig.textContent='משוואה מקורית: '+e.raw;
  } else orig.textContent='';

  const guide=document.getElementById('eq-guide');
  if(!isSolved()){
    if(st.ln!==0||st.rx!==0)guide.textContent='יש להביא למבנה: ax = b';
    else if(Math.abs(st.lx-1)>1e-9)guide.textContent='חלק במקדם של x לבידוד הנעלם';
    else guide.textContent='';
  } else guide.textContent='';

  const la=document.getElementById('log-area');
  if(!log.length)la.innerHTML='<div style="font-size:12px;color:var(--color-text-tertiary)">טרם בוצעו פעולות</div>';
  else la.innerHTML=log.map(e=>`<div class="log-entry"><span class="log-op">${e.op}</span><span class="log-eq">${e.eq}</span></div>`).join('');
  // scroll log to bottom
  const lc=document.querySelector('.log-card');
  if(lc)lc.scrollTop=lc.scrollHeight;

  const banner=document.getElementById('solved-banner');
  if(isSolved()){banner.textContent=`המשוואה נפתרה! x = ${r3(st.rn)}`;banner.classList.add('show');}
  else banner.classList.remove('show');

  renderProgress();
  renderEqList();
  updPreview();
}

function renderEqList(){
  const ul=document.getElementById('eq-list');
  if(!ul)return;
  ul.innerHTML=eqs.map((e,i)=>`<div class="eq-row2${i===ci?' curr':e.done?' done2':''}" onclick="loadIdx(${i});hubTabByName('eq')">
    <span class="eq-num2">${i+1}</span>
    <span class="eq-txt2">${e.raw}</span>
    <span class="dot-b ${i===ci?'dot-c':e.done?'dot-d':'dot-t'}"></span>
  </div>`).join('');
}

function hubTabByName(t){
  document.querySelectorAll('.hub-tab').forEach((b,i)=>b.classList.toggle('active',['eq','exercises','par'][i]===t));
  document.querySelectorAll('.sim-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('hub-'+t).classList.add('active');
  if(t==='eq')setTimeout(()=>{rz();drawScale(st);},30);
}

function loadIdx(i){
  if(!eqs[i])return;
  ci=i;const e=eqs[i];
  st={lx:e.lx,ln:e.ln,rx:e.rx||0,rn:e.rn};
  log=[{op:'התחלה',eq:fmtEq(st)}];
  xMode=null;op='add';busy=false;
  document.getElementById('exec-btn').disabled=false;
  document.getElementById('err-msg').textContent='';
  document.getElementById('anim-bar').textContent='';
  document.getElementById('solved-banner').classList.remove('show');
  document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('op-add').classList.add('sel');
  document.getElementById('xadd-btn').classList.remove('on');
  document.getElementById('xsub-btn').classList.remove('on');
  render();
}

function resetCurr(){loadIdx(ci);}
function nextEq(){loadIdx((ci+1)%eqs.length);}
function resetAll(){eqs.forEach(e=>e.done=false);loadIdx(0);}

function addEq(){
  const inp=document.getElementById('add-inp');
  const err=document.getElementById('add-err');
  const raw=inp.value.trim();
  if(!raw)return;
  const p=parseEqStr(raw);
  if(!p){err.textContent='פורמט לא תקין. דוגמה: 2x+3=9';return;}
  err.textContent='';
  eqs.push({raw,...p,done:false});
  inp.value='';
  renderEqList();
  renderProgress();
}

function hubTab(t,btn){
  document.querySelectorAll('.hub-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.sim-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('hub-'+t).classList.add('active');
  if(t==='eq')setTimeout(()=>{rz();drawScale(st);},30);
  if(t==='exercises')renderEqList();
}

window.addEventListener('resize',()=>{if(!busy){rz();drawScale(st);}});
loadIdx(0);
</script>
